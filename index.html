<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div class="window" id="searchWindow">
            <div class="window-header">
                <span>🔍 Search & Unblock</span>
                <button class="close-btn" onclick="toggleApp('searchWindow')">×</button>
            </div>
            <div class="window-content">
                <form id="proxyForm" class="os-form">
                    <input type="text" id="proxyInput" placeholder="Enter URL or search..." required>
                    <button type="submit">Go</button>
                </form>
                <div class="quick-links">
                    <a href="https://google.com" target="_blank">Google</a>
                    <a href="https://youtube.com" target="_blank">YouTube</a>
                </div>
            </div>
        </div>

        <div class="window" id="musicWindow" style="top: 100px; left: 400px;">
            <div class="window-header">
                <span>🎵 Music Player</span>
                <button class="close-btn" onclick="toggleApp('musicWindow')">×</button>
            </div>
            <div class="window-content">
                <label for="fileInput" class="custom-upload">Choose Audio File</label>
                <input type="file" id="fileInput" accept="audio/*">
                <audio id="audioPlayer" controls></audio>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button class="start-btn" onclick="toggleApp('searchWindow')">Search</button>
        <button class="start-btn" onclick="toggleApp('musicWindow')">Music</button>
        <div id="clock">00:00:00</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
